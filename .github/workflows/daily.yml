name: Auto Post AI 2026
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Jalan otomatis jam 07:00 WIB

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google GenAI SDK
        run: pip install -U google-genai

      - name: Generate and Save Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import os, datetime
          from google import genai
          
          try:
              # 1. Setup Client dengan Jalur Stabil (v1)
              api_key = os.getenv('GEMINI_API_KEY')
              if not api_key:
                  print('Error: GEMINI_API_KEY tidak ditemukan di Secrets!')
                  exit(1)
              
              client = genai.Client(api_key=api_key, http_options={'api_version': 'v1'})
              
              # 2. Ambil Judul dari titles.txt
              if not os.path.exists('titles.txt'):
                  print('Error: titles.txt tidak ditemukan!')
                  exit(1)
                  
              with open('titles.txt', 'r', encoding='utf-8') as f:
                  lines = f.readlines()
                  
              if not lines:
                  print('Info: titles.txt kosong, tidak ada artikel yang dibuat.')
                  exit(0)
              
              topic = lines[0].strip()
              
              # Hapus judul yang sudah diambil dari daftar
              with open('titles.txt', 'w', encoding='utf-8') as f:
                  f.writelines(lines[1:])
              
              print(f'Sedang memproses judul: {topic}')
              
              # 3. Pastikan folder _posts ada
              if not os.path.exists('_posts'):
                  os.makedirs('_posts')
              
              # 4. Generate Konten
              response = client.models.generate_content(
                  model='gemini-1.5-flash', 
                  contents=f'Write a professional SEO blog post about {topic} in Markdown format. Use H2 and H3 headings. Start directly with the article content.'
              )
              
              if not response.text:
                  print('Gagal: AI tidak menghasilkan teks.')
                  exit(1)

              # 5. Simpan ke File
              date_str = datetime.datetime.now().strftime('%Y-%m-%d')
              safe_title = topic.lower().replace(' ', '-').replace('?', '').replace('!', '').replace(':', '')
              filename = f'_posts/{date_str}-{safe_title}.md'
              
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(response.text)
              
              print(f'✅ Berhasil! File dibuat: {filename}')
              
          except Exception as e:
              print(f'❌ Terjadi kesalahan: {e}')
              exit(1)
          "

      - name: Commit and Push to GitHub
        run: |
          git config --global user.name "SakaAutoBot"
          git config --global user.email "bot@sakawebsite.com"
          git add _posts/*.md
          git add titles.txt
          # Hanya commit jika ada perubahan
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan untuk di-commit."
          else
            git commit -m "Automated post: $(date +'%Y-%m-%d')"
            git push origin main
