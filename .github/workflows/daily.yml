name: Auto Post
on:
  schedule:
    - cron: '0 0 * * *' # Jalan otomatis jam 7 pagi WIB
  workflow_dispatch: # Tombol manual
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install google-generativeai
      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_blog.py
      - name: Save Changes
        run: |
          git config --global user.name "SakaBot"
          git config --global user.email "bot@saka.com"
          git add .
          git commit -m "Automated post" || exit 0
          git push
