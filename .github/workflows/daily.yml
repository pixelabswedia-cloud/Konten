name: Auto Post AI 2026
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google GenAI SDK
        run: pip install -U google-genai

      - name: Generate and Save Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import os, datetime
          from google import genai
          
          try:
              api_key = os.getenv('GEMINI_API_KEY')
              if not api_key:
                  print('Error: API Key tidak ditemukan!')
                  exit(1)
              
              # Gunakan versi v1 (Stabil)
              client = genai.Client(api_key=api_key, http_options={'api_version': 'v1'})
              
              # PROSES PENCARIAN MODEL OTOMATIS (Anti-404)
              print('Mengecek daftar model yang tersedia...')
              available_models = [m.name for m in client.models.list() if 'generateContent' in m.supported_methods]
              
              if not available_models:
                  print('Error: Tidak ada model yang mendukung generateContent ditemukan!')
                  exit(1)
              
              # Cari model yang ada kata 'flash', jika tidak ada pakai yang pertama
              selected_model = next((m for m in available_models if 'flash' in m), available_models[0])
              print(f'Model ditemukan: {available_models}')
              print(f'Menggunakan model: {selected_model}')
              
              # Baca Judul
              if not os.path.exists('titles.txt'):
                  print('Error: titles.txt tidak ada!')
                  exit(1)
              with open('titles.txt', 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              if not lines:
                  print('Info: titles.txt kosong.')
                  exit(0)
              
              topic = lines[0].strip()
              with open('titles.txt', 'w', encoding='utf-8') as f:
                  f.writelines(lines[1:])
              
              print(f'Sedang memproses judul: {topic}')
              
              if not os.path.exists('_posts'):
                  os.makedirs('_posts')
              
              # Generate Konten
              response = client.models.generate_content(
                  model=selected_model, 
                  contents=f'Write a professional SEO blog post about {topic} in Markdown format. Use H2 and H3 headings. Start directly with the content.'
              )
              
              if not response.text:
                  print('Gagal: AI tidak menghasilkan teks.')
                  exit(1)

              # Simpan File
              date_str = datetime.datetime.now().strftime('%Y-%m-%d')
              safe_title = topic.lower().replace(' ', '-').replace('?', '').replace('!', '').replace(':', '')
              filename = f'_posts/{date_str}-{safe_title}.md'
              
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(response.text)
              
              print(f'✅ Berhasil! File dibuat: {filename}')
              
          except Exception as e:
              print(f'❌ Terjadi kesalahan fatal: {e}')
              exit(1)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "SakaAutoBot"
          git config --global user.email "bot@sakawebsite.com"
          git add _posts/*.md
          git add titles.txt
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan."
          else
            git commit -m "Automated post: $(date +'%Y-%m-%d')"
            git push origin main
