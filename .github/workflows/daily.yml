name: Auto Post AI 2026
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google GenAI SDK
        run: pip install -U google-genai

      - name: Generate and Save Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import os, datetime
          from google import genai
          
          try:
              api_key = os.getenv('GEMINI_API_KEY')
              client = genai.Client(api_key=api_key, http_options={'api_version': 'v1'})
              
              # Cari Judul
              if not os.path.exists('titles.txt'):
                  print('Error: titles.txt tidak ada!')
                  exit(1)
              with open('titles.txt', 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              if not lines:
                  print('Info: titles.txt kosong.')
                  exit(0)
              
              topic = lines[0].strip()
              print(f'Memproses judul: {topic}')

              # MENCOBA BEBERAPA VARIASI NAMA MODEL (Mana yang berhasil duluan)
              content = None
              # Daftar model potensial di 2026
              model_list = ['gemini-1.5-flash', 'gemini-1.5-flash-001', 'gemini-2.0-flash-exp']
              
              for model_name in model_list:
                  try:
                      print(f'Mencoba model: {model_name}...')
                      response = client.models.generate_content(
                          model=model_name, 
                          contents=f'Write a professional SEO blog post about {topic} in Markdown format. Use H2 and H3 headings. Start directly.'
                      )
                      if response.text:
                          content = response.text
                          print(f'✅ Berhasil menggunakan {model_name}')
                          break
                  except Exception as e:
                      print(f'Gagal dengan {model_name}, mencoba yang lain...')
                      continue

              if not content:
                  print('❌ Semua model gagal merespon.')
                  exit(1)

              # Update titles.txt (Hapus baris pertama setelah berhasil)
              with open('titles.txt', 'w', encoding='utf-8') as f:
                  f.writelines(lines[1:])

              # Simpan File
              if not os.path.exists('_posts'): os.makedirs('_posts')
              date_str = datetime.datetime.now().strftime('%Y-%m-%d')
              safe_title = topic.lower().replace(' ', '-').replace('?', '').replace('!', '').replace(':', '')
              filename = f'_posts/{date_str}-{safe_title}.md'
              
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f'✅ File mendarat di: {filename}')
              
          except Exception as e:
              print(f'❌ Terjadi kesalahan: {e}')
              exit(1)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "SakaAutoBot"
          git config --global user.email "bot@sakawebsite.com"
          git add _posts/*.md
          git add titles.txt
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan."
          else
            git commit -m "Automated post: $(date +'%Y-%m-%d')"
            git push origin main
