name: Auto Post AI
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google AI
        run: pip install -U google-generativeai

      - name: Generate and Save Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import os, google.generativeai as genai, datetime
          
          # Setup API
          api_key = os.getenv('GEMINI_API_KEY')
          genai.configure(api_key=api_key)
          
          # Gunakan model yang paling standar
          model_name = 'models/gemini-1.5-flash'
          model = genai.GenerativeModel(model_name)
          
          # Baca Judul
          if not os.path.exists('titles.txt'):
              print('File titles.txt tidak ada!')
              exit(1)
          with open('titles.txt', 'r') as f:
              lines = f.readlines()
          if not lines:
              print('titles.txt kosong!')
              exit(1)
          
          topic = lines[0].strip()
          with open('titles.txt', 'w') as f:
              f.writelines(lines[1:])
          
          print(f'Memproses: {topic}')
          
          # Buat Folder
          if not os.path.exists('_posts'):
              os.makedirs('_posts')
          
          # Generate Konten dengan Error Handling
          try:
              response = model.generate_content(f'Write a pro blog post about {topic} in Markdown. Use H2 and H3. Start directly.')
              content = response.text
              
              # Nama File
              date_str = datetime.datetime.now().strftime('%Y-%m-%d')
              safe_title = topic.lower().replace(' ', '-').replace('?', '').replace('!', '')
              filename = f'_posts/{date_str}-{safe_title}.md'
              
              with open(filename, 'w') as f:
                  f.write(content)
              print(f'✅ Berhasil! File dibuat: {filename}')
          except Exception as e:
              print(f'❌ Gagal memanggil AI: {e}')
              exit(1)
          "

      - name: Push to GitHub
        run: |
          git config --global user.name "SakaBot"
          git config --global user.email "bot@saka.com"
          git add _posts/*.md
          git add titles.txt
          git commit -m "Automated post: $(date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push origin main
