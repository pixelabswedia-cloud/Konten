name: Auto Post AI
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google AI
        run: pip install -U google-generativeai

      - name: Generate and Save Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import os, google.generativeai as genai, datetime
          api_key = os.getenv('GEMINI_API_KEY')
          genai.configure(api_key=api_key)
          model = genai.GenerativeModel('gemini-1.5-flash-latest')
          
          # Ambil judul
          if not os.path.exists('titles.txt'):
              print('File titles.txt tidak ada!')
              exit()
          with open('titles.txt', 'r') as f:
              lines = f.readlines()
          if not lines:
              print('titles.txt kosong!')
              exit()
          
          topic = lines[0].strip()
          with open('titles.txt', 'w') as f:
              f.writelines(lines[1:])
          
          print(f'Memproses: {topic}')
          
          # Buat Folder
          if not os.path.exists('_posts'):
              os.makedirs('_posts')
          
          # Generate
          response = model.generate_content(f'Write a pro blog post about {topic} in Markdown.')
          
          # Simpan
          filename = f'_posts/{datetime.datetime.now().strftime(\"%Y-%m-%d\")}-{topic.lower().replace(\" \", \"-\")}.md'
          with open(filename, 'w') as f:
              f.write(response.text)
          print(f'File dibuat: {filename}')
          "

      - name: Push to GitHub
        run: |
          git config --global user.name "SakaBot"
          git config --global user.email "bot@saka.com"
          git add _posts/*.md
          git add titles.txt
          git commit -m "Add new post" || echo "Nothing to commit"
          git push origin main
